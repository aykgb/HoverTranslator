<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>HoverTranslate 设置</title>
    <style>
        body {
            width: 220px;
            /* 限制弹窗宽度 */
            padding: 15px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #8e0000;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: #666;
            display: block;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #E63946;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #2e7d32;
            text-align: center;
            height: 16px;
            /* 占位防止跳动 */
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>
    <h3>🎨 主题风格</h3>
    <label for="theme">请选择翻译弹窗外观：</label>
    <select id="theme">
        <option value="theme-light" selected>简约护眼白 (默认)</option>
        <option value="theme-dark">经典极客黑</option>
        <option value="theme-red">高级勃艮第红</option>
    </select>
    <div id="status">已自动保存！</div>

    <script src="popup.js"></script>
</body>

</html>
